name: Geolocator CI

on:
  pull_request:
  push:
    branches:
      - feat/crop-circle-geolocator-mvp
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install repository and lightweight worker
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e "services/geolocator[dev,server,stac]"
      - name: Validate schemas and benchmark JSON
        run: python scripts/validate_geolocator_schemas.py
      - name: Run geolocator unit and synthetic integration tests
        run: python -m pytest services/geolocator/tests -q
      - name: Run portable existing Python tests
        run: |
          # Two corpus-regeneration modules require the intentionally untracked
          # data/raw archive. The complete 83-test suite is run locally where
          # that archive is present; CI runs every clean-checkout-safe module.
          python -c "from pathlib import Path; import subprocess,sys; excluded={'test_formation_image_catalog.py','test_global_source_image_links.py'}; tests=[str(p) for p in sorted(Path('tests').glob('test_*.py')) if p.name not in excluded]; raise SystemExit(subprocess.call([sys.executable,'-m','unittest',*tests]))"
      - name: Run existing JavaScript tests
        run: node --test tests/*.mjs
      - name: Run isolated benchmark command
        run: python -m crop_circle_geo.cli benchmark --manifest services/geolocator/benchmarks/reviewed-cases-input.json --synthetic > "${RUNNER_TEMP}/geolocator-benchmark.json"
      - name: Run repository verifier when the raw archive is available
        run: |
          if [[ -f data/raw/iccra_full/objects/810ac528eef688636ee1f262366c6fa70e92b71d0e674a29cc5f38846e2361e6.htm ]]; then
            python scripts/verify.py
          else
            echo "Clean checkout: data/raw is intentionally untracked; full verifier result is recorded from the local acceptance run."
          fi
      - name: Check license audit coverage
        run: python scripts/check_geolocator_license_metadata.py
      - name: Check repository hygiene
        run: python scripts/check_geolocator_repo_hygiene.py
